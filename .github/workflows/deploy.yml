name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci
    env:
      CI_NETWORK: cosmos-ci
      CI_DB_NAME: cosmos-ci-db
      CI_API_NAME: cosmos-ci-api
      CI_BACKEND_IMAGE: cosmos-backend:ci
      CI_DATABASE_URL: postgres://cosmos:cosmos@cosmos-ci-db:5432/cosmos?sslmode=disable
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-flags: --allow-insecure-entitlement network.host

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build backend (load locally for prerender API)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: ${{ env.CI_BACKEND_IMAGE }}

      - name: Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Start API + DB for prerender
        run: |
          set -euo pipefail
          docker network create "$CI_NETWORK"

          docker run -d --name "$CI_DB_NAME" --network "$CI_NETWORK" \
            -e POSTGRES_USER=cosmos \
            -e POSTGRES_PASSWORD=cosmos \
            -e POSTGRES_DB=cosmos \
            --health-cmd="pg_isready -U cosmos -d cosmos" \
            --health-interval=5s --health-timeout=5s --health-retries=10 \
            postgres:16-alpine

          DB_DEADLINE=$(( $(date +%s) + 60 ))
          until [ "$(docker inspect -f '{{.State.Health.Status}}' "$CI_DB_NAME")" = "healthy" ]; do
            [ "$(date +%s)" -lt "$DB_DEADLINE" ] || { echo "db not healthy in time"; docker logs "$CI_DB_NAME"; exit 1; }
            sleep 3
          done

          docker run -d --name "$CI_API_NAME" --network "$CI_NETWORK" \
            -p 8080:8080 \
            -e APP_ENV=production \
            -e HTTP_ADDR=:8080 \
            -e DATABASE_URL="$CI_DATABASE_URL" \
            -e MIGRATE_ON_BOOT=true \
            -e CORS_ALLOWED_ORIGINS=http://localhost:3000 \
            -e CONNECT_RATE_RPS=1000 \
            -e CONNECT_RATE_BURST=2000 \
            "$CI_BACKEND_IMAGE"

      - name: Wait for API health
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 60 ))
          until curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; do
            [ "$(date +%s)" -lt "$DEADLINE" ] || { echo "api not healthy in time"; docker logs "$CI_API_NAME"; exit 1; }
            sleep 3
          done

      - name: Seed prerender DB from baked-in data
        run: |
          set -euo pipefail
          docker run --rm --network "$CI_NETWORK" \
            -e DATABASE_URL="$CI_DATABASE_URL" \
            -e SEED_SOURCE_DIR=/data/entities \
            --entrypoint /app/seed \
            "$CI_BACKEND_IMAGE"

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          network: host
          allow: network.host
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            API_INTERNAL_URL=http://localhost:8080
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_ORIGIN=${{ vars.NEXT_PUBLIC_API_ORIGIN }}
            NEXT_PUBLIC_GOOGLE_VERIFICATION=${{ vars.NEXT_PUBLIC_GOOGLE_VERIFICATION }}
            NEXT_PUBLIC_YANDEX_VERIFICATION=${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}
            NEXT_PUBLIC_YANDEX_METRIKA_ID=${{ vars.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
            NEXT_PUBLIC_GA4_ID=${{ vars.NEXT_PUBLIC_GA4_ID }}
            NEXT_PUBLIC_UMAMI_SRC=${{ vars.NEXT_PUBLIC_UMAMI_SRC }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS=${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_HOSTS }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}

      - name: Tear down prerender stack
        if: always()
        run: |
          docker rm -f "$CI_API_NAME" "$CI_DB_NAME" 2>/dev/null || true
          docker network rm "$CI_NETWORK" 2>/dev/null || true

  backup:
    name: Pre-deploy DB backup
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Create backup on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            BACKUP_DIR=/opt/backups/cosmos
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
            SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$TIMESTAMP-$SHA_SHORT.sql.gz"

            cd /opt/apps/cosmos

            if ! docker compose ps db --status running --format '{{.Name}}' | grep -q cosmos-db; then
              echo "db not running yet — skipping backup (likely first deploy)"
              exit 0
            fi

            set -a; . ./.env; set +a

            docker compose exec -T db pg_dump \
              -U cosmos -d cosmos --clean --if-exists --no-owner --no-privileges \
              | gzip > "$BACKUP_FILE"

            SIZE=$(stat -c%s "$BACKUP_FILE")
            if [ "$SIZE" -lt 1024 ]; then
              echo "ERROR: backup suspiciously small: $SIZE bytes"
              exit 1
            fi

            find "$BACKUP_DIR" -name '*.sql.gz' -mtime +30 -delete

            echo "backup ok: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

  deploy:
    name: Deploy + health-gate + auto-rollback
    runs-on: ubuntu-latest
    needs: [build-push, backup]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yml,docker-compose.prod.yml
          target: /opt/apps/cosmos/

      - name: Deploy + health-gate + auto-rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/apps/cosmos

            PREV_SHA=$(cat .last-good-sha 2>/dev/null || echo "")
            NEW_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

            set_env_var() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            set_env_var IMAGE_PREFIX "ghcr.io/${{ github.repository }}"
            set_env_var IMAGE_TAG "$NEW_SHA"
            set_env_var COMPOSE_FILE "docker-compose.yml:docker-compose.prod.yml"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT

            docker pull ${{ env.BACKEND_IMAGE }}:"$NEW_SHA"
            docker pull ${{ env.FRONTEND_IMAGE }}:"$NEW_SHA"

            docker compose up -d db --wait --wait-timeout 60
            docker compose --profile tools run --rm migrate

            PLANET_COUNT=$(docker compose exec -T db psql -U cosmos -d cosmos -tAc "select count(*) from planets" 2>/dev/null || echo 0)
            PLANET_COUNT=$(echo "$PLANET_COUNT" | tr -d '[:space:]')
            if [ -z "$PLANET_COUNT" ] || [ "$PLANET_COUNT" = "0" ]; then
              echo "planets table empty or missing — seeding (first deploy)"
              docker compose --profile tools run --rm seed
            else
              echo "planets table has $PLANET_COUNT rows — skipping seed"
            fi

            docker compose up -d --remove-orphans

            DEADLINE=$(( $(date +%s) + 120 ))
            HEALTHY=0
            while [ "$(date +%s)" -lt "$DEADLINE" ]; do
              if docker compose exec -T frontend wget -qO- http://cosmos-api:8080/healthz >/dev/null 2>&1 \
                 && docker compose exec -T frontend wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 \
                 && docker compose exec -T frontend wget -qO- http://127.0.0.1:3000/en/planets/mercury >/dev/null 2>&1 \
                 && docker compose exec -T frontend wget -qO- http://127.0.0.1:3000/ru/missions/apollo-11 >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" -eq 1 ]; then
              echo "deploy healthy, warming ISR cache..."
              REVALIDATE_SECRET=$(grep '^REVALIDATE_SECRET=' .env | cut -d= -f2-)
              if [ -n "$REVALIDATE_SECRET" ]; then
                for tag in planets planets-en planets-ru missions missions-en missions-ru trajectories trajectories-en trajectories-ru; do
                  docker compose exec -T frontend wget -qO- \
                    --header="x-revalidate-secret: $REVALIDATE_SECRET" \
                    --header="Content-Type: application/json" \
                    --post-data="{\"tag\":\"$tag\"}" \
                    http://127.0.0.1:3000/api/revalidate >/dev/null || true
                done
              fi
              for path in /en /ru /en/planets /ru/planets /en/missions /ru/missions; do
                docker compose exec -T frontend wget -qO /dev/null "http://127.0.0.1:3000$path" || true
              done
              POSTWARM_OK=1
              for path in /en/planets/mercury /ru/missions/apollo-11; do
                if ! docker compose exec -T frontend wget -qO /dev/null "http://127.0.0.1:3000$path" 2>/dev/null; then
                  POSTWARM_OK=0
                fi
              done
              if [ "$POSTWARM_OK" -ne 1 ]; then
                echo "ERROR: entity pages broken after ISR warm-up"
                HEALTHY=0
              else
                echo "marking $NEW_SHA as last-good"
                echo "$NEW_SHA" > .last-good-sha
                docker image prune -f
                exit 0
              fi
            fi

            echo "ERROR: deploy failed health-gate. Rolling back to ${PREV_SHA:-<none>}..."
            docker compose logs --tail=100 api frontend db

            if [ -z "$PREV_SHA" ]; then
              echo "FATAL: no .last-good-sha — rollback impossible on first deploy."
              echo "Manual intervention required: restore from /opt/backups/cosmos/"
              exit 2
            fi

            set_env_var IMAGE_TAG "$PREV_SHA"
            docker pull ${{ env.BACKEND_IMAGE }}:"$PREV_SHA"
            docker pull ${{ env.FRONTEND_IMAGE }}:"$PREV_SHA"
            docker compose up -d --remove-orphans

            sleep 30
            if docker compose ps api --status running --format '{{.Name}}' | grep -q cosmos-api \
               && docker compose ps frontend --status running --format '{{.Name}}' | grep -q cosmos-frontend; then
              echo "rollback to $PREV_SHA successful — containers are up"
              exit 1
            fi

            echo "FATAL: rollback failed too. Manual intervention required."
            echo "Backups available at /opt/backups/cosmos/"
            exit 2

  notify:
    name: Notify status
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "::notice::Deployed ${{ needs.build-push.outputs.sha_short }} to production"
          else
            echo "::error::Deploy failed for ${{ needs.build-push.outputs.sha_short }} (result=${{ needs.deploy.result }})"
          fi

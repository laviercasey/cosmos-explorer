<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1a3a" />
      <stop offset="60%" stop-color="#00000a" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="planet" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#88ccff" />
      <stop offset="70%" stop-color="#44aaff" />
      <stop offset="100%" stop-color="#113355" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" />
  <!-- orbit ring -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#44aaff" stroke-opacity="0.35" stroke-width="3" />
  <!-- central planet -->
  <circle cx="256" cy="256" r="96" fill="url(#planet)" />
  <!-- small companion -->
  <circle cx="416" cy="216" r="14" fill="#aabbdd" />
  <!-- stars -->
  <circle cx="88" cy="108" r="3" fill="#ffffff" opacity="0.85" />
  <circle cx="420" cy="96" r="2" fill="#ffffff" opacity="0.7" />
  <circle cx="112" cy="400" r="2.5" fill="#ffffff" opacity="0.75" />
  <circle cx="396" cy="420" r="3" fill="#ffffff" opacity="0.85" />
  <circle cx="60" cy="256" r="1.8" fill="#ffffff" opacity="0.6" />
  <circle cx="470" cy="300" r="1.8" fill="#ffffff" opacity="0.6" />
</svg>

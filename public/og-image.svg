<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Cosmos Explorer — Interactive 3D Solar System">
  <defs>
    <radialGradient id="bg" cx="70%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1a3a" />
      <stop offset="45%" stop-color="#030614" />
      <stop offset="100%" stop-color="#00000a" />
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd88" />
      <stop offset="60%" stop-color="#ffaa44" />
      <stop offset="100%" stop-color="#aa5522" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="planet1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7ec8ff" />
      <stop offset="100%" stop-color="#1a3a6e" />
    </radialGradient>
    <radialGradient id="planet2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffc18a" />
      <stop offset="100%" stop-color="#6e3a1a" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- star field -->
  <g fill="#ffffff">
    <circle cx="80"   cy="70"  r="1.2" opacity="0.9" />
    <circle cx="180"  cy="140" r="0.8" opacity="0.6" />
    <circle cx="320"  cy="50"  r="1.4" opacity="0.8" />
    <circle cx="480"  cy="110" r="0.9" opacity="0.7" />
    <circle cx="560"  cy="40"  r="1.1" opacity="0.9" />
    <circle cx="720"  cy="90"  r="0.7" opacity="0.5" />
    <circle cx="860"  cy="160" r="1.3" opacity="0.85" />
    <circle cx="1020" cy="60"  r="0.9" opacity="0.7" />
    <circle cx="1120" cy="130" r="1.1" opacity="0.8" />
    <circle cx="60"   cy="260" r="0.8" opacity="0.6" />
    <circle cx="220"  cy="320" r="1.0" opacity="0.7" />
    <circle cx="380"  cy="240" r="1.2" opacity="0.9" />
    <circle cx="640"  cy="220" r="0.8" opacity="0.6" />
    <circle cx="960"  cy="290" r="1.1" opacity="0.85" />
    <circle cx="1160" cy="230" r="0.9" opacity="0.7" />
    <circle cx="100"  cy="480" r="1.0" opacity="0.7" />
    <circle cx="260"  cy="540" r="0.7" opacity="0.5" />
    <circle cx="540"  cy="500" r="1.3" opacity="0.9" />
    <circle cx="720"  cy="560" r="0.9" opacity="0.7" />
    <circle cx="900"  cy="510" r="1.1" opacity="0.8" />
    <circle cx="1080" cy="570" r="0.8" opacity="0.6" />
  </g>

  <!-- orbit rings -->
  <g fill="none" stroke="#2a4a7a" stroke-opacity="0.35">
    <ellipse cx="900" cy="420" rx="220" ry="60" />
    <ellipse cx="900" cy="420" rx="340" ry="92" />
    <ellipse cx="900" cy="420" rx="460" ry="124" />
  </g>

  <!-- sun -->
  <circle cx="900" cy="420" r="54" fill="url(#sun)" filter="url(#glow)" />

  <!-- planets on orbits -->
  <circle cx="1120" cy="420" r="14" fill="url(#planet2)" />
  <circle cx="1240" cy="420" r="22" fill="url(#planet1)" opacity="0.95" />
  <g transform="translate(560,480)">
    <circle r="30" fill="url(#planet1)" />
    <ellipse cx="0" cy="2" rx="52" ry="8" fill="none" stroke="#88aacc" stroke-opacity="0.6" stroke-width="2" />
  </g>

  <!-- text block -->
  <g font-family="'Courier New', Courier, monospace" fill="#aabbdd">
    <text x="80" y="240" font-size="30" fill="#44aaff" letter-spacing="8">COSMOS EXPLORER</text>
    <text x="80" y="330" font-size="66" fill="#ffffff" font-weight="700" letter-spacing="2">Interactive 3D</text>
    <text x="80" y="400" font-size="66" fill="#ffffff" font-weight="700" letter-spacing="2">Solar System</text>
    <text x="80" y="470" font-size="26" fill="#88aacc">8 planets · 128 space missions · WebGL</text>
    <text x="80" y="520" font-size="22" fill="#556677">Fly between worlds. Replay Apollo, Voyager, Cassini.</text>
    <text x="80" y="580" font-size="18" fill="#44aaff" letter-spacing="3">cosmos.lavier.tech</text>
  </g>
</svg>
